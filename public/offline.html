<!doctype html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
<title>Vijender Pal Singh — Offline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100dvh;display:flex;align-items:center;justify-content:center;background:#FDFBF7;font-family:Mukta,system-ui,sans-serif;color:#1F2937;padding:24px}
.card{text-align:center;max-width:420px}
.lotus{width:72px;height:72px;margin:0 auto 24px;background:#FF9933;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:36px;line-height:1}
h1{font-family:Khand,'Arial Black',sans-serif;font-size:clamp(28px,5vw,40px);color:#0F523A;margin-bottom:12px;font-weight:600;letter-spacing:.02em}
p{font-size:18px;line-height:1.6;color:#4B5563;margin-bottom:24px}
.wifi{display:inline-block;width:48px;height:48px;border-radius:50%;border:3px dashed #FF9933;margin-bottom:20px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 32px;background:#FF9933;color:#fff;font-family:Khand,sans-serif;font-size:18px;font-weight:600;border:none;border-radius:8px;cursor:pointer;text-decoration:none;transition:background .2s}
.btn:hover{background:#e68a00}
.btn:focus-visible{outline:3px solid #0F523A;outline-offset:2px}
footer{margin-top:32px;font-size:14px;color:#9CA3AF}
</style>
</head>
<body>
<div class="card">
  <div class="lotus">🪷</div>
  <div class="wifi"></div>
  <h1>अभी ऑफलाइन हैं</h1>
  <p>Vijender Pal Singh का पोर्टफोलियो लोड करने के लिए इंटरनेट कनेक्शन की आवश्यकता है। कृपया कनेक्ट होने पर पुनः प्रयास करें।</p>
  <a href="/" class="btn">⟳ पुनः प्रयास करें</a>
  <footer>Vijender Pal Singh — Sri Karanpur</footer>
</div>
</body>
</html>
